<!DOCTYPE html>
<html>
<head>
    <title>Messages Table</title>
    <style>
        table {
            width: 80%;
            margin: auto;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }

        th {
            background-color: #2196F3;
            color: white;
        }
    </style>
</head>
<body>

<h2 style="text-align:center;">Contact Messages</h2>

<table id="msgTable">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Message</th>
    </tr>
</table>

<script>
fetch("http://localhost:8080/api/contact")
.then(res => res.json())
.then(data => {
    let table = document.getElementById("msgTable");

    data.forEach(msg => {
        let row = table.insertRow();
        row.insertCell(0).innerText = msg.id;
        row.insertCell(1).innerText = msg.name;
        row.insertCell(2).innerText = msg.email;
        row.insertCell(3).innerText = msg.message;
    });
});
</script>

</body>
</html>
